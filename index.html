<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コカ・コーラ vs コカ・コーラゼロ 販売本数対決</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #D82020;
      --red-dark: #A32D2D;
      --red-light: #FCEBEB;
      --zero-dark: #2C2C2A;
      --zero-mid: #444441;
      --zero-light: #F1EFE8;
      --text-primary: #1a1a18;
      --text-secondary: #5F5E5A;
      --text-tertiary: #888780;
      --bg-primary: #ffffff;
      --bg-secondary: #F7F6F2;
      --bg-tertiary: #EFEDE8;
      --border: rgba(0,0,0,0.12);
      --border-strong: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #F1EFE8;
        --text-secondary: #B4B2A9;
        --text-tertiary: #888780;
        --bg-primary: #1C1C1A;
        --bg-secondary: #252523;
        --bg-tertiary: #2C2C2A;
        --border: rgba(255,255,255,0.10);
        --border-strong: rgba(255,255,255,0.20);
        --red-light: #3a1212;
        --zero-light: #252523;
      }
    }

    body {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header-eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }
    .header-title {
      font-size: 26px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .header-title span { color: var(--red); }
    .header-updated {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 8px;
    }

    /* Score cards */
    .score-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .score-card {
      background: var(--bg-primary);
      border-radius: var(--radius-xl);
      border: 0.5px solid var(--border);
      padding: 1.25rem 1rem;
      text-align: center;
    }
    .score-card-label {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .score-card-number {
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
      letter-spacing: -1px;
    }
    .score-card-pct {
      font-size: 13px;
      font-weight: 500;
    }
    .score-card.original .score-card-number { color: var(--red); }
    .score-card.original .score-card-pct { color: var(--red-dark); }
    .score-card.zero .score-card-number { color: var(--text-primary); }
    .score-card.zero .score-card-pct { color: var(--text-secondary); }
    .vs-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-align: center;
    }

    /* Tug bar */
    .section {
      background: var(--bg-primary);
      border-radius: var(--radius-xl);
      border: 0.5px solid var(--border);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .tug-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .tug-bar-track {
      height: 32px;
      border-radius: 16px;
      background: var(--bg-secondary);
      overflow: hidden;
      display: flex;
      position: relative;
      border: 0.5px solid var(--border);
    }
    .tug-original {
      background: var(--red);
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      height: 100%;
    }
    .tug-zero {
      background: var(--zero-mid);
      flex: 1;
      height: 100%;
    }
    .tug-midline {
      position: absolute;
      left: calc(50% - 1px);
      top: 0;
      width: 2px;
      height: 100%;
      background: var(--bg-primary);
      opacity: 0.6;
    }
    .winner-row {
      display: flex;
      justify-content: center;
      margin-top: 12px;
      min-height: 28px;
    }
    .winner-badge {
      font-size: 13px;
      font-weight: 500;
      padding: 4px 16px;
      border-radius: var(--radius-md);
    }
    .winner-badge.original { background: var(--red-light); color: var(--red-dark); }
    .winner-badge.zero { background: var(--zero-light); color: var(--zero-mid); }
    .winner-badge.tie { background: var(--bg-secondary); color: var(--text-tertiary); }

    /* Odds note */
    .odds-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 8px;
    }

    /* Chart */
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 220px;
    }

    /* Input section */
    .input-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: flex-end;
    }
    .input-group { display: flex; flex-direction: column; gap: 5px; }
    .input-group label {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }
    .input-group input {
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-size: 18px;
      font-weight: 600;
      width: 100%;
      background: var(--bg-secondary);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .input-group.orig input:focus { border-color: var(--red); }
    .input-group.zero input:focus { border-color: var(--zero-mid); }
    .update-btn {
      background: var(--red);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }
    .update-btn:hover { background: var(--red-dark); }
    .update-btn:active { transform: scale(0.97); }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Diff bar under tug */
    .diff-meter {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: center;
    }

    @media (max-width: 480px) {
      .header-title { font-size: 20px; }
      .score-card-number { font-size: 30px; }
      .input-row { grid-template-columns: 1fr 1fr; }
      .update-btn { grid-column: 1 / -1; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <p class="header-eyebrow">クスリのアオキ × コカ・コーラ キャンペーン</p>
      <h1 class="header-title"><span>コカ・コーラ</span> vs コカ・コーラゼロ<br>販売本数 リアルタイム対決</h1>
      <p class="header-updated" id="last-updated">—</p>
    </div>

    <div class="score-grid">
      <div class="score-card original">
        <p class="score-card-label">コカ・コーラ</p>
        <p class="score-card-number" id="cnt-orig">0</p>
        <p class="score-card-pct" id="pct-orig">—</p>
      </div>
      <div class="vs-text">vs</div>
      <div class="score-card zero">
        <p class="score-card-label">コカ・コーラ ゼロ</p>
        <p class="score-card-number" id="cnt-zero">0</p>
        <p class="score-card-pct" id="pct-zero">—</p>
      </div>
    </div>

    <div class="section">
      <p class="section-title">勝敗バー</p>
      <div class="tug-labels">
        <span>オリジナル</span>
        <span>ゼロ</span>
      </div>
      <div class="tug-bar-track">
        <div class="tug-original" id="tug-bar" style="width:50%"></div>
        <div class="tug-zero"></div>
        <div class="tug-midline"></div>
      </div>
      <div class="winner-row">
        <span class="winner-badge tie" id="winner-badge">本数を入力してください</span>
      </div>
      <p class="odds-note" id="bonus-note"></p>
    </div>

    <div class="section">
      <p class="section-title">販売本数グラフ</p>
      <div class="legend">
        <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>コカ・コーラ</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--zero-mid)"></span>コカ・コーラ ゼロ</span>
      </div>
      <div class="chart-wrap">
        <canvas id="battleChart" role="img" aria-label="コカ・コーラとコカ・コーラゼロの販売本数比較棒グラフ">販売本数比較グラフ</canvas>
      </div>
    </div>

    <div class="section">
      <p class="input-title">本数を入力して更新</p>
      <div class="input-row">
        <div class="input-group orig">
          <label>コカ・コーラ（本）</label>
          <input type="number" id="in-orig" placeholder="例：12000" min="0">
        </div>
        <div class="input-group zero">
          <label>コカ・コーラ ゼロ（本）</label>
          <input type="number" id="in-zero" placeholder="例：9500" min="0">
        </div>
        <button class="update-btn" onclick="updateBattle()">更新</button>
      </div>
    </div>

  </div>

  <script>
    let chart;

    function initChart() {
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
      const tickColor = isDark ? '#888780' : '#888780';

      chart = new Chart(document.getElementById('battleChart'), {
        type: 'bar',
        data: {
          labels: ['コカ・コーラ', 'コカ・コーラ ゼロ'],
          datasets: [{
            data: [0, 0],
            backgroundColor: ['#D82020', '#444441'],
            borderRadius: 8,
            borderSkipped: false,
            barPercentage: 0.55
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 600, easing: 'easeInOutQuart' },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => '  ' + ctx.parsed.y.toLocaleString() + ' 本'
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: tickColor, font: { size: 13 } }
            },
            y: {
              grid: { color: gridColor },
              ticks: {
                color: tickColor,
                font: { size: 12 },
                callback: v => v.toLocaleString()
              },
              beginAtZero: true
            }
          }
        }
      });
    }

    function updateBattle() {
      const orig = parseInt(document.getElementById('in-orig').value) || 0;
      const zero = parseInt(document.getElementById('in-zero').value) || 0;
      const total = orig + zero;

      document.getElementById('cnt-orig').textContent = orig.toLocaleString();
      document.getElementById('cnt-zero').textContent = zero.toLocaleString();

      const now = new Date();
      document.getElementById('last-updated').textContent =
        '最終更新：' + now.toLocaleDateString('ja-JP') + ' ' + now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

      if (total > 0) {
        const origPct = Math.round(orig / total * 100);
        const zeroPct = 100 - origPct;
        document.getElementById('pct-orig').textContent = origPct + '%';
        document.getElementById('pct-zero').textContent = zeroPct + '%';
        document.getElementById('tug-bar').style.width = origPct + '%';

        const wb = document.getElementById('winner-badge');
        const diff = orig - zero;

        if (diff > 0) {
          wb.textContent = 'オリジナルがリード  +' + diff.toLocaleString() + '本';
          wb.className = 'winner-badge original';
          document.getElementById('bonus-note').textContent =
            'このまま終了 → オリジナル購入者に +10pt / 本（後日付与）';
        } else if (diff < 0) {
          wb.textContent = 'ゼロがリード  +' + Math.abs(diff).toLocaleString() + '本';
          wb.className = 'winner-badge zero';
          document.getElementById('bonus-note').textContent =
            'このまま終了 → ゼロ購入者に +20pt / 本（後日付与）';
        } else {
          wb.textContent = '同数 — 引き分け';
          wb.className = 'winner-badge tie';
          document.getElementById('bonus-note').textContent = '';
        }
      } else {
        document.getElementById('pct-orig').textContent = '—';
        document.getElementById('pct-zero').textContent = '—';
        document.getElementById('tug-bar').style.width = '50%';
        document.getElementById('winner-badge').textContent = '本数を入力してください';
        document.getElementById('winner-badge').className = 'winner-badge tie';
        document.getElementById('bonus-note').textContent = '';
      }

      chart.data.datasets[0].data = [orig, zero];
      chart.options.scales.y.max = Math.ceil(Math.max(orig, zero, 1) * 1.2);
      chart.update();
    }

    document.getElementById('in-orig').addEventListener('keydown', e => e.key === 'Enter' && updateBattle());
    document.getElementById('in-zero').addEventListener('keydown', e => e.key === 'Enter' && updateBattle());

    initChart();
  </script>
</body>
</html>
