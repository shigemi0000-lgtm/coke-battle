<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コカ・コーラ vs コカ・コーラゼロ 販売本数対決</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #D82020; --red-dark: #A32D2D; --red-light: #FCEBEB;
      --zero-mid: #444441; --zero-light: #F1EFE8;
      --text-primary: #1a1a18; --text-secondary: #5F5E5A; --text-tertiary: #888780;
      --bg-primary: #ffffff; --bg-secondary: #F7F6F2; --bg-tertiary: #EFEDE8;
      --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.22);
      --radius-md: 8px; --radius-xl: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #F1EFE8; --text-secondary: #B4B2A9; --text-tertiary: #888780;
        --bg-primary: #1C1C1A; --bg-secondary: #252523; --bg-tertiary: #2C2C2A;
        --border: rgba(255,255,255,0.10); --border-strong: rgba(255,255,255,0.20);
        --red-light: #3a1212; --zero-light: #252523;
      }
    }
    body { background: var(--bg-tertiary); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; min-height: 100vh; padding: 2rem 1rem 4rem; }
    .container { max-width: 680px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 2rem; }
    .header-eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
    .header-title { font-size: 26px; font-weight: 600; line-height: 1.3; }
    .header-title span { color: var(--red); }
    .header-updated { font-size: 12px; color: var(--text-tertiary); margin-top: 8px; }

    .score-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 1.5rem; }
    .score-card { background: var(--bg-primary); border-radius: var(--radius-xl); border: 0.5px solid var(--border); padding: 1.25rem 1rem; text-align: center; }
    .score-card-label { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.05em; margin-bottom: 8px; }
    .score-card-number { font-size: 40px; font-weight: 700; line-height: 1; margin-bottom: 4px; letter-spacing: -1px; }
    .score-card-pct { font-size: 13px; font-weight: 500; }
    .score-card.original .score-card-number { color: var(--red); }
    .score-card.original .score-card-pct { color: var(--red-dark); }
    .score-card.zero .score-card-number { color: var(--text-primary); }
    .score-card.zero .score-card-pct { color: var(--text-secondary); }
    .vs-text { font-size: 20px; font-weight: 700; color: var(--text-tertiary); text-align: center; }

    .section { background: var(--bg-primary); border-radius: var(--radius-xl); border: 0.5px solid var(--border); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .section-title { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

    .tug-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .tug-bar-track { height: 32px; border-radius: 16px; background: var(--bg-secondary); overflow: hidden; display: flex; position: relative; border: 0.5px solid var(--border); }
    .tug-original { background: var(--red); transition: width 0.7s cubic-bezier(0.4,0,0.2,1); height: 100%; }
    .tug-zero { background: var(--zero-mid); flex: 1; height: 100%; }
    .tug-midline { position: absolute; left: calc(50% - 1px); top: 0; width: 2px; height: 100%; background: var(--bg-primary); opacity: 0.6; }
    .winner-row { display: flex; justify-content: center; margin-top: 12px; min-height: 28px; }
    .winner-badge { font-size: 13px; font-weight: 500; padding: 4px 16px; border-radius: var(--radius-md); }
    .winner-badge.original { background: var(--red-light); color: var(--red-dark); }
    .winner-badge.zero { background: var(--zero-light); color: var(--zero-mid); }
    .winner-badge.tie { background: var(--bg-secondary); color: var(--text-tertiary); }
    .bonus-note { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 8px; }

    /* Bonus card */
    .bonus-card { margin-top: 14px; border-radius: var(--radius-md); padding: 12px 16px; display: none; }
    .bonus-card.original { background: var(--red-light); border: 1px solid rgba(216,32,32,0.25); }
    .bonus-card.zero { background: var(--zero-light); border: 1px solid rgba(68,68,65,0.2); }
    .bonus-card-top { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .bonus-card.original .bonus-card-top { color: var(--red-dark); }
    .bonus-card.zero .bonus-card-top { color: var(--zero-mid); }
    .bonus-card-body { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .bonus-card-text { font-size: 13px; }
    .bonus-card.original .bonus-card-text { color: var(--red-dark); }
    .bonus-card.zero .bonus-card-text { color: var(--zero-mid); }
    .bonus-card-pt { font-size: 28px; font-weight: 700; letter-spacing: -1px; white-space: nowrap; }
    .bonus-card.original .bonus-card-pt { color: var(--red); }
    .bonus-card.zero .bonus-card-pt { color: var(--zero-mid); }
    .bonus-card-sub { font-size: 11px; margin-top: 2px; opacity: 0.7; }
    .bonus-card.original .bonus-card-sub { color: var(--red-dark); }
    .bonus-card.zero .bonus-card-sub { color: var(--zero-mid); }

    /* Countdown */
    .countdown-section { background: var(--bg-primary); border-radius: var(--radius-xl); border: 0.5px solid var(--border); padding: 1.25rem 1.5rem; margin-bottom: 1rem; text-align: center; }
    .countdown-label { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
    .countdown-units { display: flex; justify-content: center; gap: 8px; align-items: flex-end; }
    .countdown-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .countdown-num { font-size: 36px; font-weight: 700; line-height: 1; color: var(--text-primary); letter-spacing: -1px; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 8px 14px; min-width: 64px; }
    .countdown-unit-label { font-size: 11px; color: var(--text-tertiary); }
    .countdown-sep { font-size: 28px; font-weight: 700; color: var(--text-tertiary); padding-bottom: 14px; line-height: 1; }
    .countdown-end { font-size: 12px; color: var(--text-tertiary); margin-top: 12px; }
    .countdown-finished { font-size: 15px; font-weight: 500; color: var(--text-secondary); }

    .chart-wrap { position: relative; width: 100%; height: 220px; }
    .legend { display: flex; justify-content: center; gap: 20px; margin-bottom: 14px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Admin */
    .admin-badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; background: var(--red-light); color: var(--red-dark); padding: 3px 10px; border-radius: var(--radius-md); margin-bottom: 12px; }
    .input-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: flex-end; }
    .input-group { display: flex; flex-direction: column; gap: 5px; }
    .input-group label { font-size: 11px; color: var(--text-tertiary); }
    .input-group input { border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); padding: 10px 12px; font-size: 18px; font-weight: 600; width: 100%; background: var(--bg-secondary); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .input-group.orig input:focus { border-color: var(--red); }
    .input-group.zero-in input:focus { border-color: var(--zero-mid); }
    .btn-red { background: var(--red); color: white; border: none; border-radius: var(--radius-md); padding: 12px 22px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s, transform 0.1s; }
    .btn-red:hover { background: var(--red-dark); }
    .btn-red:active { transform: scale(0.97); }
    .btn-ghost { background: none; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); padding: 8px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }
    .btn-ghost:hover { background: var(--bg-secondary); }

    .qr-url-row { display: flex; gap: 10px; align-items: center; }
    .qr-url-row input { flex: 1; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); padding: 10px 12px; font-size: 13px; background: var(--bg-secondary); color: var(--text-primary); outline: none; }
    .qr-url-row input:focus { border-color: var(--red); }

    /* Lock button */
    .lock-btn { display: block; margin: 1.5rem auto 0; background: none; border: none; cursor: pointer; font-size: 20px; opacity: 0.2; padding: 8px; transition: opacity 0.2s; }
    .lock-btn:hover { opacity: 0.5; }

    /* Modal */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .overlay.on { display: flex; }
    .modal { background: var(--bg-primary); border-radius: var(--radius-xl); padding: 1.75rem 2rem; width: 320px; border: 0.5px solid var(--border); }
    .modal-title { font-size: 15px; font-weight: 500; text-align: center; margin-bottom: 1rem; }
    .modal input[type=password] { width: 100%; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); padding: 11px 14px; font-size: 16px; background: var(--bg-secondary); color: var(--text-primary); outline: none; margin-bottom: 8px; }
    .modal input[type=password]:focus { border-color: var(--red); }
    .modal-error { font-size: 12px; color: var(--red); min-height: 18px; text-align: center; margin-bottom: 10px; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns .btn-red { flex: 1; padding: 10px; }
    .modal-btns .btn-ghost { flex: 1; padding: 10px; }

    @media (max-width: 480px) {
      .header-title { font-size: 20px; }
      .score-card-number { font-size: 30px; }
      .input-row { grid-template-columns: 1fr 1fr; }
      .btn-red { grid-column: 1 / -1; width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <p class="header-eyebrow">クスリのアオキ × コカ・コーラ キャンペーン</p>
    <h1 class="header-title"><span>コカ・コーラ</span> vs コカ・コーラゼロ<br>販売本数 リアルタイム対決</h1>
    <p class="header-updated" id="last-updated">—</p>
  </div>

  <div class="score-grid">
    <div class="score-card original">
      <p class="score-card-label">コカ・コーラ</p>
      <p class="score-card-number" id="cnt-orig">0</p>
      <p class="score-card-pct" id="pct-orig">—</p>
    </div>
    <div class="vs-text">vs</div>
    <div class="score-card zero">
      <p class="score-card-label">コカ・コーラ ゼロ</p>
      <p class="score-card-number" id="cnt-zero">0</p>
      <p class="score-card-pct" id="pct-zero">—</p>
    </div>
  </div>

  <div class="section">
    <p class="section-title">勝敗バー</p>
    <div class="tug-labels"><span>オリジナル</span><span>ゼロ</span></div>
    <div class="tug-bar-track">
      <div class="tug-original" id="tug-bar" style="width:50%"></div>
      <div class="tug-zero"></div>
      <div class="tug-midline"></div>
    </div>
    <div class="winner-row">
      <span class="winner-badge tie" id="winner-badge">集計中...</span>
    </div>
    <p class="bonus-note" id="bonus-note"></p>
    <div class="bonus-card original" id="bonus-card">
      <div class="bonus-card-top" id="bonus-card-label">勝者ボーナス（後日付与）</div>
      <div class="bonus-card-body">
        <div class="bonus-card-text" id="bonus-card-text">このまま終了すると<br>勝利商品の購入者全員に</div>
        <div>
          <div class="bonus-card-pt" id="bonus-card-pt">+10pt</div>
          <div class="bonus-card-sub">/本</div>
        </div>
      </div>
    </div>
  </div>

  <!-- カウントダウン -->
  <div class="countdown-section">
    <p class="countdown-label">キャンペーン終了まで</p>
    <div id="countdown-display">
      <div class="countdown-units">
        <div class="countdown-unit">
          <div class="countdown-num" id="cd-days">--</div>
          <div class="countdown-unit-label">日</div>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-unit">
          <div class="countdown-num" id="cd-hours">--</div>
          <div class="countdown-unit-label">時間</div>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-unit">
          <div class="countdown-num" id="cd-mins">--</div>
          <div class="countdown-unit-label">分</div>
        </div>
      </div>
      <p class="countdown-end">終了日：2026年5月31日</p>
    </div>
    <div id="countdown-finished" style="display:none;" class="countdown-finished">キャンペーン終了</div>
  </div>

  <div class="section">
    <p class="section-title">販売本数グラフ</p>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>コカ・コーラ</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--zero-mid)"></span>コカ・コーラ ゼロ</span>
    </div>
    <div class="chart-wrap">
      <canvas id="battleChart" role="img" aria-label="コカ・コーラとコカ・コーラゼロの販売本数比較棒グラフ">販売本数比較グラフ</canvas>
    </div>
  </div>

  <!-- 管理者のみ表示 -->
  <div id="admin-panel" style="display:none;">
    <div class="section">
      <div class="admin-badge">管理者モード</div>
      <p class="input-title">本数を入力して更新</p>
      <div class="input-row">
        <div class="input-group orig">
          <label>コカ・コーラ（本）</label>
          <input type="number" id="in-orig" placeholder="例：12000" min="0">
        </div>
        <div class="input-group zero-in">
          <label>コカ・コーラ ゼロ（本）</label>
          <input type="number" id="in-zero" placeholder="例：9500" min="0">
        </div>
        <button class="btn-red" onclick="updateBattle()">更新</button>
      </div>
    </div>

    <div class="section">
      <p class="section-title">QRコード</p>
      <div class="qr-url-row">
        <input type="text" id="qr-url-input" placeholder="https://ユーザー名.github.io/cola-battle/">
        <button class="btn-red" onclick="generateQR()">生成</button>
      </div>
      <div id="qr-area" style="display:none; margin-top:1.25rem; text-align:center;">
        <div id="qr-output" style="display:inline-block; padding:16px; background:#fff; border-radius:12px; border:0.5px solid var(--border);"></div>
        <p style="font-size:12px; color:var(--text-tertiary); margin-top:10px; word-break:break-all;" id="qr-url-display"></p>
        <button class="btn-ghost" style="margin-top:12px;" onclick="downloadQR()">PNG でダウンロード</button>
      </div>
    </div>

    <div style="text-align:right; margin-bottom:1rem;">
      <button class="btn-ghost" onclick="lockAdmin()">ログアウト</button>
    </div>
  </div>

  <!-- 鍵ボタン（目立たない） -->
  <button class="lock-btn" id="lock-btn" onclick="openModal()">&#128274;</button>

</div>

<!-- パスワードモーダル -->
<div class="overlay" id="overlay">
  <div class="modal">
    <p class="modal-title">管理者ログイン</p>
    <input type="password" id="pw-input" placeholder="パスワードを入力" autocomplete="current-password">
    <p class="modal-error" id="pw-error"></p>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn-red" onclick="checkPw()">ログイン</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  /* ==============================
     ★ 毎日ここだけ書き換えてください
     ============================== */
  const DATA_ORIG = 5321212;      // コカ・コーラ の本数
  const DATA_ZERO = 3052867;      // コカ・コーラ ゼロ の本数
  const DATA_DATE = '2026年4月27日 19:00 時点';     // 例: '2026年5月1日 10:00 時点'
  /* ============================== */

  /* パスワード */
  const ADMIN_PW = 'cola2026';

  let chart;

  function showBonusCard(type, text, pt) {
    const card = document.getElementById('bonus-card');
    card.className = 'bonus-card ' + type;
    document.getElementById('bonus-card-text').innerHTML = 'このまま終了すると<br>' + text;
    document.getElementById('bonus-card-pt').textContent = pt;
    card.style.display = 'block';
  }
  function hideBonusCard() {
    document.getElementById('bonus-card').style.display = 'none';
  }

  /* ===== カウントダウン ===== */
  const CAMPAIGN_END = new Date('2026-05-31T23:59:59+09:00');
  function updateCountdown() {
    const now = new Date();
    const diff = CAMPAIGN_END - now;
    if (diff <= 0) {
      document.getElementById('countdown-display').style.display = 'none';
      document.getElementById('countdown-finished').style.display = 'block';
      return;
    }
    const days  = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const mins  = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    document.getElementById('cd-days').textContent  = String(days).padStart(2, '0');
    document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('cd-mins').textContent  = String(mins).padStart(2, '0');
  }

  function initChart() {
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    chart = new Chart(document.getElementById('battleChart'), {
      type: 'bar',
      data: {
        labels: ['コカ・コーラ', 'コカ・コーラ ゼロ'],
        datasets: [{ data: [0, 0], backgroundColor: ['#D82020', '#444441'], borderRadius: 8, borderSkipped: false, barPercentage: 0.55 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 600, easing: 'easeInOutQuart' },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => '  ' + c.parsed.y.toLocaleString() + ' 本' } } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#888780', font: { size: 13 } } },
          y: { grid: { color: dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)' }, ticks: { color: '#888780', font: { size: 12 }, callback: v => v.toLocaleString() }, beginAtZero: true }
        }
      }
    });
  }

  function updateBattle() {
    const orig = parseInt(document.getElementById('in-orig').value) || 0;
    const zero = parseInt(document.getElementById('in-zero').value) || 0;
    localStorage.setItem('cola_orig', orig);
    localStorage.setItem('cola_zero', zero);
    renderBattle(orig, zero, '');
  }

  function renderBattle(orig, zero, dateLabel) {
    const total = orig + zero;
    document.getElementById('cnt-orig').textContent = orig.toLocaleString();
    document.getElementById('cnt-zero').textContent = zero.toLocaleString();
    if (dateLabel) {
      document.getElementById('last-updated').textContent = dateLabel + ' 時点';
    } else {
      const now = new Date();
      document.getElementById('last-updated').textContent =
        '最終更新：' + now.toLocaleDateString('ja-JP') + ' ' + now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }
    if (total > 0) {
      const op = Math.round(orig / total * 100);
      document.getElementById('pct-orig').textContent = op + '%';
      document.getElementById('pct-zero').textContent = (100 - op) + '%';
      document.getElementById('tug-bar').style.width = op + '%';
      const wb = document.getElementById('winner-badge');
      const diff = orig - zero;
      if (diff > 0) {
        wb.textContent = 'オリジナルがリード  +' + diff.toLocaleString() + '本';
        wb.className = 'winner-badge original';
        showBonusCard('original', 'オリジナル購入者に勝者ボーナス', '+10pt');
      } else if (diff < 0) {
        wb.textContent = 'ゼロがリード  +' + Math.abs(diff).toLocaleString() + '本';
        wb.className = 'winner-badge zero';
        showBonusCard('zero', 'ゼロ購入者に勝者ボーナス', '+20pt');
      } else {
        wb.textContent = '同数 — 引き分け';
        wb.className = 'winner-badge tie';
        hideBonusCard();
      }
    } else {
      document.getElementById('pct-orig').textContent = '—';
      document.getElementById('pct-zero').textContent = '—';
      document.getElementById('tug-bar').style.width = '50%';
      document.getElementById('winner-badge').textContent = '集計中...';
      document.getElementById('winner-badge').className = 'winner-badge tie';
      document.getElementById('bonus-note').textContent = '';
      hideBonusCard();
    }
    chart.data.datasets[0].data = [orig, zero];
    const rawMax = Math.max(orig, zero, 1) * 1.25;
    const magnitude = Math.pow(10, Math.floor(Math.log10(rawMax)));
    chart.options.scales.y.max = Math.ceil(rawMax / magnitude) * magnitude;
    chart.update();
  }

  /* ===== 認証 ===== */
  function openModal() {
    document.getElementById('overlay').classList.add('on');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
    setTimeout(() => document.getElementById('pw-input').focus(), 80);
  }
  function closeModal() { document.getElementById('overlay').classList.remove('on'); }
  function checkPw() {
    if (document.getElementById('pw-input').value === ADMIN_PW) {
      sessionStorage.setItem('admin', '1');
      showAdmin(); closeModal();
    } else {
      document.getElementById('pw-error').textContent = 'パスワードが違います';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }
  function showAdmin() {
    document.getElementById('admin-panel').style.display = 'block';
    document.getElementById('lock-btn').style.display = 'none';
  }
  function lockAdmin() {
    sessionStorage.removeItem('admin');
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('lock-btn').style.display = 'block';
  }

  /* ===== QR ===== */
  function generateQR() {
    const url = document.getElementById('qr-url-input').value.trim();
    if (!url) { alert('URLを入力してください'); return; }
    const out = document.getElementById('qr-output');
    out.innerHTML = '';
    new QRCode(out, { text: url, width: 200, height: 200, colorDark: '#1a1a18', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
    document.getElementById('qr-url-display').textContent = url;
    document.getElementById('qr-area').style.display = 'block';
  }
  function downloadQR() {
    const c = document.querySelector('#qr-output canvas');
    if (!c) { alert('先にQRコードを生成してください'); return; }
    const a = document.createElement('a');
    a.download = 'cola-battle-qr.png';
    a.href = c.toDataURL('image/png');
    a.click();
  }

  /* ===== 起動 ===== */
  document.addEventListener('DOMContentLoaded', () => {
    initChart();
    if (sessionStorage.getItem('admin') === '1') showAdmin();

    if (DATA_ORIG > 0 || DATA_ZERO > 0) {
      const inOrig = document.getElementById('in-orig');
      const inZero = document.getElementById('in-zero');
      if (inOrig) inOrig.value = DATA_ORIG;
      if (inZero) inZero.value = DATA_ZERO;
      renderBattle(DATA_ORIG, DATA_ZERO, DATA_DATE);
    }
    updateCountdown();
    setInterval(updateCountdown, 30000);
    document.getElementById('pw-input').addEventListener('keydown', e => e.key === 'Enter' && checkPw());
    document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });
    document.getElementById('in-orig') && document.getElementById('in-orig').addEventListener('keydown', e => e.key === 'Enter' && updateBattle());
    document.getElementById('in-zero') && document.getElementById('in-zero').addEventListener('keydown', e => e.key === 'Enter' && updateBattle());
  });
</script>
</body>
</html>
